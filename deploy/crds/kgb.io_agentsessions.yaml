apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentsessions.kgb.io
spec:
  group: kgb.io
  names:
    kind: AgentSession
    listKind: AgentSessionList
    plural: agentsessions
    singular: agentsession
    shortNames:
      - kgbas
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Agent
          type: string
          jsonPath: .spec.agentId
        - name: Trust
          type: string
          jsonPath: .spec.trustMode
        - name: Drift
          type: string
          jsonPath: .status.driftDetected
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - agentId
              properties:
                agentId:
                  type: string
                trustMode:
                  type: string
                  enum: [paranoid, balanced, permissive]
                  default: balanced
                tenantId:
                  type: string
                  description: Logical tenant identifier for multi-tenant routing.
            status:
              type: object
              properties:
                lastEvaluatedIntent:
                  type: object
                  properties:
                    action:
                      type: string
                    target:
                      type: string
                    risk:
                      type: string
                      enum: [low, medium, high, critical]
                    confidence:
                      type: number
                      format: double
                driftDetected:
                  type: boolean
                driftReason:
                  type: string
                lastTransitionTime:
                  type: string
                  format: date-time
          required:
            - spec
