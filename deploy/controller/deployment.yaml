apiVersion: apps/v1
kind: Deployment
metadata:
  name: kgb-controller
  namespace: kgb-system
  labels:
    app.kubernetes.io/name: kgb-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kgb-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kgb-controller
    spec:
      serviceAccountName: kgb-controller
      containers:
        - name: controller
          image: ghcr.io/akram/kgb-controller:latest
          args:
            - "--metrics-bind-address=:8080"
            - "--health-probe-bind-address=:8081"
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
